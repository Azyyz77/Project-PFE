groups:
  - name: backend_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"4..|5.."}[2m]))
            /
            sum(rate(http_requests_total[2m]))
          ) * 100 > 10
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreurs élevé ({{ printf %.1f $value }}%)"

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 0.5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Latence P95 > 500ms sur {{ $labels.route }}"

      - alert: HighMemoryUsage
        expr: nodejs_heap_size_used_bytes > 150000000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Heap Node.js > 150MB ({{ $value | humanizeBytes }})"

      - alert: EventLoopLag
        expr: nodejs_eventloop_lag_seconds > 0.05
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Event loop lag > 50ms"

      - alert: BackendDown
        expr: up{job="sta-chery-api"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Backend inaccessible"
