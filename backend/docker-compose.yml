services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: projet_PFE_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Daligh2004"
      MSSQL_TCP_PORT: "1433"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./script.sql:/usr/config/script.sql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dali@2024!' -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - projet-pfe

volumes:
  sqlserver_data:
    driver: local

networks:
  projet-pfe:
    driver: bridge