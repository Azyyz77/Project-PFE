name: Simple Web Site Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  simple-tests:
    name: 🧪 Simple Tests (Frontend & Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Test Backend (Unit Tests)
        working-directory: backend
        run: |
          npm ci
          echo "JWT_SECRET=simple_test_secret" > .env
          echo "NODE_ENV=test" >> .env
          npm run test:unit

      - name: Test Frontend (Build Check)
        working-directory: frontend
        run: |
          npm ci
          echo "NEXT_PUBLIC_API_URL=http://localhost:5000" > .env.local
          npm run build
